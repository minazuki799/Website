name: Keep Streamlit App Awake

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  wake-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install selenium

      - name: Wake Streamlit App with Selenium
        run: |
          python - <<EOF
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By
          import time
          import os

          # Setup modern headless Chrome
          options = Options()
          options.add_argument("--headless=new")
          options.add_argument("--no-sandbox")
          options.add_argument("--disable-dev-shm-usage")

          # Selenium 4.6+ automatically handles the driver (no webdriver-manager needed)
          driver = webdriver.Chrome(options=options)

          try:
              print("Opening Streamlit app...")
              driver.get("https://streamlit.app")

              # Wait for page to load
              time.sleep(15)

              # Try to find the wake button
              try:
                  # XPATH updated to be more flexible for Streamlit's UI
                  wake_button = driver.find_element(By.XPATH, "//button[contains(., 'Yes, get this app back up')]")
                  wake_button.click()
                  print("Clicked wake button — app was sleeping")
                  time.sleep(15)
              except Exception:
                  print("App was already awake or button not found — no action needed")

              # Take a screenshot to verify success (saved in the runner)
              driver.save_screenshot("app_status.png")
              print(f"Page title: {driver.title}")
              print("✅ App successfully visited")

          finally:
              driver.quit()
          EOF

      - name: Upload status screenshot
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshot
          path: app_status.png
